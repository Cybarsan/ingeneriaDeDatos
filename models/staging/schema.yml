version: 2

models:
  - name: stg_orders
    description: "Órdenes de compra limpias y tipadas desde la fuente MySQL"
    columns:
      - name: order_id
        description: "ID único de la orden"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "ID del cliente que realizó la orden"
        tests:
          - not_null
      - name: product_id
        description: "ID del producto ordenado"
        tests:
          - not_null
      - name: amount
        description: "Monto total de la orden en USD"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 100000
      - name: status
        description: "Estado actual de la orden"
        tests:
          - not_null
          - accepted_values:
              values: ['completed', 'pending', 'cancelled']
      - name: order_date
        description: "Fecha de la orden (sin hora)"
        tests:
          - not_null

  - name: stg_customers
    description: "Clientes limpios y tipados desde la fuente MySQL"
    columns:
      - name: customer_id
        description: "ID único del cliente"
        tests:
          - unique
          - not_null
      - name: name
        description: "Nombre completo del cliente"
        tests:
          - not_null
      - name: email
        description: "Email del cliente"
        tests:
          - unique
          - not_null
          - dbt_expectations.expect_column_value_lengths_to_be_between:
              arguments:
                min_value: 5
                max_value: 100
      - name: country
        description: "País de residencia del cliente"
        tests:
          - not_null

  - name: stg_products
    description: "Productos limpios y tipados desde la fuente MySQL"
    columns:
      - name: product_id
        description: "ID único del producto"
        tests:
          - unique
          - not_null
      - name: product_name
        description: "Nombre del producto"
        tests:
          - not_null
      - name: category
        description: "Categoría del producto"
        tests:
          - not_null
      - name: price
        description: "Precio del producto en USD"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 10000
